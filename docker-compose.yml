services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    volumes:
      - db_data:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - BACKEND_URL=http://backend:4000
      - NEXT_OUTPUT=standalone
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
